front:
  text: 丹陽真人直言
  hash: sha256:956875cc254b6275b164ec4a71bb735ebe770bce5a1cdb4b43356613b07ff9d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0043_SJB_000-320155a, image: sjb/32/320155a.png}
body:
  text: 示門人真人在龍門山重陽會上謂衆曰日用者上不得欺謾天地常謹謹修行寸陰可惜莫虛度日須索減省睡眠亦是人之所欲須要换過則不是打坐長要心定行住坐卧皆是行道諸公休起心動念疾搜性命但能澄心遣欲便是神仙别休認休生疑此是端真實語惟要長清長浄勉力行之但悟萬悟屢假自心證欲自遣性自停命自住丹自結仙自做他人不能替得自家做修行各各用力休太急常逍遥自在弟子若不是師父說破不能認此爲妙法今不敢傳與他人諸公但請休生疑心無疑心便是得道之人常處無爲清浄自然之理更要發煙火如此作用眞神仙也師父言曰十二時辰天地運行斡旋造化還有息否凡行道之人切須象天之道亦要十二時中無暫停住自己斡旋造化常要清浄莫起纖毫塵念乃是修行如此行持做神仙指日成矣或十二時中未有一箇時辰專心在道將來怎得了達受十方施主供養如何還得一朝合眼死入酆都長劫受苦永無岀期我今叮嚀說與汝等如何是道依此行持不得錯了你每行持不到却道掌教的人不是各人豈不念七祖生前造無邊苦業受無極苦惱望子孫成道仗天赦救拔得生天界師父爲衆言曰汝等每日不可忘日用事其日用有二有外日用有内日用外日用者大忌見他人之過自誇己德妬賢嫉能起無明火塵俗念生勝衆之心人我是非口辯憎愛内日用者休起狐疑心長莫忘於内若雲遊住坐亦澄心遣欲無掛無礙不染不著真清真浄逍遥自在如同一日存思於道如飢思飯如渴思漿稍覺偏頗即當改正依此修行决做神仙矣必不到錯了如錯了汝等罰我永墮地獄耳切須戒之行之師父言曰汝等地久天長始心如故莫生退怠勿令妄做守其自然停其喜怒外則應緣内則養固心上忘機意不著物觸處不生嫉妬二氣常要清浄一神自住水火交合坎離異户無臭無聲無往無路動而不生守之得趣其曰神仙甚曰甘露行到自知看怎生悟夫大道無形氣之祖也神之母也神氣是性命性命是龍虎龍虎是鉛汞鉛汞是水火水火是嬰姹嬰姹是陰陽眞陰眞陽即是神氣種種異名皆不用著只是神氣二字欲要養氣全神須常屏盡萬緣表裏清浄綿綿固守不動三年不漏下丹結六年不漏中丹結九年不漏大丹結圓備此名九轉大功亦名三千功滿三田圓備謂之神丹法身輕舉永爲神仙倒笑天地不能長久何爲天有崩地有陷山有摧海有竭有形必有壞能修先之物無形無象豈有壞乎丹陽真人直言終
