front:
  text: 丹陽眞人直言
  hash: sha256:ea7a591e6f9c14bb063da2ec57c4c30280dc7e85417a2dddb92811313c7d0acd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0043_CK-KZ_01p026a, image: JY191/CK-KZ_JY191_01p026a.png}
body:
  text: 示門人眞人在龍門山重陽會上謂眾曰日用者上不得欺謾天地常謹謹修行寸陰可惜莫虛度日須索減省睡眠亦是人之所欲須要換過則不是打坐長要心定行住坐卧皆是行道諸公休起心動念疾搜性命但能澄心遣欲便是神仙别休認休生疑此是端眞實語惟要長清長淨勉力行之但悟萬悟屢假自心證欲自遣性自停命自住丹自結仙自做他人不能替得自家做修行各各用力休太急常逍遙自在弟子若不是師父說破不能認此爲妙法今不敢傳與他人諸公但請休生疑心無疑心便是得道之人常處無爲清淨自然之理便要發煙火如此作用眞神仙也你師言曰十二時辰天地運行斡旋造化還有息否凡行道之人切須象天之道亦要十二時中無暫停住自已斡旋造化常要清淨莫起纖毫塵念乃是修行如此行持做神仙指日成矣或十二時中未有一箇時辰專心在道將來怎得了達受十方施主供養如何還得一朝合眼死入酆都長劫受苦永無出期我今叮嚀說與汝等如何是道依此行持不得錯了你每行持不到卻道掌教的人不是各人豈不念七祖生前造無邊苦業受無極苦惱望子孫成道仗天赦救拔得生天界師父爲眾言曰汝等每日不可忘日用事其日用有二有外日用有內日用外日用者大忌見他人之過自誇已德妬賢嫉能起無明火塵俗念生勝眾之心人我是非口辯憎愛內日用者休起狐疑心長莫忘於內若雲遊住作亦澄心遣欲無掛無礙不染不著眞清眞淨逍遙自在如同一日存思於道如飢思飯如渴思漿稍覺偏頗卽當改正依此修行決做神仙矣必不到錯了如錯了汝等罰我永墮地獄耳切須戒之行之師父言曰汝等地久天長始心如故莫生退怠勿令妄做守其自然停其喜怒外則應緣內則養固心上忘機意不著物觸處不生嫉妬二氣常要清淨一神自住水火交合坎離異戸無臭無聲無往無路動而不生守之得趣其曰神仙甚曰甘露行到自知看怎生悟夫大道無形氣之祖也神之母也神氣是性命性命是龍虎龍虎是鉛汞鉛汞是水火水火是嬰姹嬰姹是陰陽眞陰眞陽卽是神氣種種異名皆不用著只是神氣二字欲要養氣全神須常屏盡萬緣表裏清淨綿綿固守不動三年不漏下丹結六年不漏中丹結九年不漏大丹結圓備此名九轉大功亦名三千功滿三田圓備謂之神丹法身輕舉永爲神仙倒笑天地不能長久何爲天有崩地有陷山有摧海有竭有形必有壞能修先天之物無形無象豈有壞乎
